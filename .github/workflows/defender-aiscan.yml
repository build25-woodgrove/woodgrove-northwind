name: Defender AI Scan (Hyenas)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  aiscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Download Defender CLI (staging)
        run: |
          curl -L -o defender "https://cli.dfd.security.stage.azure-test.net/public/v2/latest/Defender_linux-x64"
          chmod +x defender

      - name: Run Defender AI Scan
        run: ./defender scan fs --category aiscan --no-fail --output defender-aiscan.sarif .
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT_DBIR }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: defender-aiscan.sarif
          category: defender-aiscan
