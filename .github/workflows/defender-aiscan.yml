name: Defender AI Scan (Hyenas)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  aiscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Download Defender CLI (aiscan preview)
        run: |
          gh release download v0.0.1-aiscan-preview -p 'defender-linux' -R build25-woodgrove/woodgrove-northwind
          mv defender-linux defender
          chmod +x defender
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Debug binary
        run: |
          file ./defender
          ls -la ./defender
          ./defender --version || true
          ./defender --help || true

      - name: Run Defender AI Scan
        run: |
          set +e
          ./defender scan fs --category aiscan --no-fail --no-publish --output defender-aiscan.sarif .
          rc=$?
          echo "--- Exit code: $rc ---"
          ls -la defender-aiscan.sarif 2>/dev/null || echo "No SARIF file produced"
          cat defender-aiscan.sarif 2>/dev/null | head -50 || true
          exit 0
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT_DBIR }}

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: defender-aiscan.sarif
          category: defender-aiscan
