name: Build and Push Container Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: shift-left-demo
  IMAGE_VERSION: v1.0.0-${{ github.run_number }}
  # Azure ACR
  ALPINE_ACR_ENDPOINT: ${{ vars.ALPINE_ACR_ENDPOINT }}
  ACRGATED_ACR_ENDPOINT: ${{ vars.ACRGATED_ACR_ENDPOINT }}
  # GCP GAR
  GCP_GAR_REGION: us
  GCP_PROJECT_ID: mdc-demo
  GCP_GAR_REPO: mdc-gcp-artifactregistry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
      artifact-metadata: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================================
      # Determine which registries are available
      # ============================================================
      - name: Check GCP configuration
        id: gcp-check
        run: |
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::notice::GCP secrets not configured - skipping GCP GAR push"
          fi

      # ============================================================
      # Generate OCI labels for Code-to-Runtime (C2C) mapping
      # ============================================================
      - name: Generate OCI metadata labels (ACR only)
        if: steps.gcp-check.outputs.configured == 'false'
        id: meta-acr
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ALPINE_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
            ${{ env.ACRGATED_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ env.IMAGE_VERSION }}
            org.label-schema.vcs-url=https://github.com/${{ github.repository }}
            com.azure.dev.image.build.repository.uri=https://github.com/${{ github.repository }}
            com.visualstudio.msazure.image.build.repository.uri=https://github.com/${{ github.repository }}

      - name: Generate OCI metadata labels (ACR + GCP)
        if: steps.gcp-check.outputs.configured == 'true'
        id: meta-all
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ALPINE_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
            ${{ env.ACRGATED_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
            ${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPO }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ env.IMAGE_VERSION }}
            org.label-schema.vcs-url=https://github.com/${{ github.repository }}
            com.azure.dev.image.build.repository.uri=https://github.com/${{ github.repository }}
            com.visualstudio.msazure.image.build.repository.uri=https://github.com/${{ github.repository }}

      # Merge outputs - whichever meta step ran
      - name: Set metadata outputs
        id: meta
        run: |
          if [ "${{ steps.gcp-check.outputs.configured }}" == "true" ]; then
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "${{ steps.meta-all.outputs.tags }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "labels<<EOF" >> $GITHUB_OUTPUT
            echo "${{ steps.meta-all.outputs.labels }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "${{ steps.meta-acr.outputs.tags }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "labels<<EOF" >> $GITHUB_OUTPUT
            echo "${{ steps.meta-acr.outputs.labels }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      # ============================================================
      # Registry Logins
      # ============================================================

      # --- Login to Azure ACR (Alpine) ---
      - name: Log in to Alpine ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALPINE_ACR_ENDPOINT }}
          username: ${{ secrets.ALPINE_ACR_USERNAME }}
          password: ${{ secrets.ALPINE_ACR_PASSWORD }}

      # --- Login to Azure ACR (Gated) ---
      - name: Log in to Acrgated ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACRGATED_ACR_ENDPOINT }}
          username: ${{ secrets.ACRGATED_ACR_USERNAME }}
          password: ${{ secrets.ACRGATED_ACR_PASSWORD }}

      # --- Login to GCP GAR via Workload Identity Federation (conditional) ---
      - name: Authenticate to Google Cloud
        if: steps.gcp-check.outputs.configured == 'true'
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Log in to GCP Artifact Registry
        if: steps.gcp-check.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_GAR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      # ============================================================
      # Build and Push
      # ============================================================

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ============================================================
      # GitHub Attestations
      # ============================================================

      - name: Attestation for Alpine ACR image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.ALPINE_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attestation for Acrgated ACR image
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.ACRGATED_ACR_ENDPOINT }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attestation for GAR image
        if: steps.gcp-check.outputs.configured == 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_GAR_REPO }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # ============================================================
      # Artifact Metadata Storage Record
      # ============================================================

      - name: Create artifact metadata storage record
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -n \
            --arg artifactName "${{ env.IMAGE_NAME }}" \
            --arg artifactVersion "${{ env.IMAGE_VERSION }}" \
            --arg artifactDigest "${{ steps.push.outputs.digest }}" \
            '{"name": $artifactName, "digest": $artifactDigest, "version": $artifactVersion, "registry_url": "https://azurecr.io", "repository": "zava-shift-left-demo"}' \
            > create-record.json
          gh api -X POST orgs/${{ github.repository_owner }}/artifacts/metadata/storage-record --input create-record.json
        shell: bash

      # ============================================================
      # Summary
      # ============================================================

      - name: Summary
        run: |
          echo "### Container Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | Image | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Alpine ACR (${{ env.ALPINE_ACR_ENDPOINT }}) | ${{ env.IMAGE_NAME }} | \`${DIGEST:0:20}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Acrgated ACR (${{ env.ACRGATED_ACR_ENDPOINT }}) | ${{ env.IMAGE_NAME }} | \`${DIGEST:0:20}...\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.gcp-check.outputs.configured }}" == "true" ]; then
            echo "| GCP GAR (${{ env.GCP_GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}) | ${{ env.IMAGE_NAME }} | \`${DIGEST:0:20}...\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **OCI Labels:** Applied (C2C mapping)" >> $GITHUB_STEP_SUMMARY
          echo "- **Attestations:** Generated for all configured registries" >> $GITHUB_STEP_SUMMARY
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
